# Centaur — FEV-warped creature, SUPERMUTANT ONLY (FEVMutants department), costs 8 perk points
# Placeholder — full implementation pending dedicated pet centaur prototype
- type: trait
  id: N14PetCentaur
  category: Pets
  points: -8
