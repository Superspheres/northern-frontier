    sprite: _Misfits/Clothing/VeteranRangers/OuterClothing/Armor/ncrriotvestlee.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/VeteranRangers/OuterClothing/Armor/ncrriotvestlee.rsi
  - type: Armor

