# [Changed by MisfitsCrew/Operator] ZAX units are Station AI-controllable NPC copies of the player-selectable silicon chassis.

- type: entity
  abstract: true
  id: MisfitsZaxUnitBase
  components:
  - type: ZaxUnit
  - type: StationAiVision
  - type: StationAiWhitelist
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: HTN
    rootTask:
      task: StationAiOrderedHoldCompound
    blackboard:
      NavSmash: !type:Bool
        true
      AggroVisionRadius: !type:Single
        12
      FollowCloseRange: !type:Single
        0.75
      FollowRange: !type:Single
        0.75
      FollowWaitMin: !type:Single
        0.25
      FollowWaitMax: !type:Single
        0.6

- type: entity
  parent: [N14MobRobotMrHandyClaw, MisfitsZaxUnitBase]
  id: N14MobZaxMrHandy
  name: ZAX Mr. Handy unit
  description: A ZAX-linked Mr. Handy chassis prepared for Station AI command.
  suffix: ZAX, AI controllable

