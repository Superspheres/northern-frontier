# NCR Loadouts
# Rank pins are NOT distributed via loadouts. NCRRankPinSpawnSystem auto-gives
# the correct pin (based on playtime) directly into the player's hand on spawn.
# See: Resources/Prototypes/_Misfits/NCR/ncr_rank_pin_progressions.yml

# ── COSMETIC LOADOUTS ─────────────────────────────────────────────────────────
# Shared cosmetics available to all active NCR roles.

- type: loadout
  id: LoadoutClothingEyesGlassesGoggles
  category: Roles
  cost: 1
  exclusive: true
  requirements:
    - !type:CharacterJobRequirement
      jobs:
        - NCRCommander
        - NCRDoctor
        - NCRExecutiveOfficer
        - NCRPlatoonLeader
        - NCRNCO
        - NCREngineer
        - NCRMedic
        - NCRWS
        - NCRHeavyTrooper
        - NCRCadet
        - NCRRO

        - NCRRangerRecruit
        - NCRFieldRanger
        - NCRPatrolRanger
        - NCRVeteranRanger
